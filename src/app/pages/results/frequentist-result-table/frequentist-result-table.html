<div class="table-container">

    <mat-table [dataSource]="dataSource" class="results-table" matSort multiTemplateDataRows>

        <ng-container matColumnDef="label">
            <mat-header-cell *matHeaderCellDef mat-sort-header="label">Term Label</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.label }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="aspect">
            <mat-header-cell *matHeaderCellDef mat-sort-header="aspect">GO-Aspect</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.aspect }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="id">
            <mat-header-cell *matHeaderCellDef mat-sort-header="id">GO-ID</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="k">
            <mat-header-cell *matHeaderCellDef mat-sort-header="k">Study Hits</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.k }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="n">
            <mat-header-cell *matHeaderCellDef mat-sort-header="n">Pop Hits</mat-header-cell>
            <mat-cell *matCellDef="let row">{{ row.n }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="p_val">
            <mat-header-cell *matHeaderCellDef mat-sort-header="p_val">P-Value</mat-header-cell>
            <mat-cell *matCellDef="let row"><span [class.significant-pval]="isSignificant(row.p_val)">{{ formatPValue(row.p_val) }}</span></mat-cell>
        </ng-container>

        <ng-container matColumnDef="expand">
            <th mat-header-cell *matHeaderCellDef>&nbsp;</th>
            <td mat-cell *matCellDef="let row">
                <span class="material-symbols-outlined" [class.expanded]="isExpanded(row)">
                    keyboard_arrow_down
                </span>
            </td>
        </ng-container>

        <ng-container matColumnDef="expandedDetail">
            <td mat-cell *matCellDef="let row" [attr.colspan]="columnsToDisplayWithExpand.length">
                <div class="element-detail-wrapper" [class.element-detail-wrapper-expanded]="isExpanded(row)">
                    <div class="element-detail">
                        <strong>Annotated Genes in Study Set:</strong>
                        <div>
                            <ul class = "gene-list">
                                <li *ngFor="let gene of row.associatedGenes">{{ gene + ',' }}</li>
                            </ul>
                        </div>
                        <ng-template #noAnnotations>No annotated genes in study set.</ng-template>
                    </div>
                </div>
            </td>
        </ng-container>

        <mat-header-row *matHeaderRowDef="columnsToDisplayWithExpand"></mat-header-row>

        <mat-row *matRowDef="let row; columns: columnsToDisplayWithExpand" class="element-row"
            [class.expanded-row]="isExpanded(row)" (click)="toggle(row); $event.stopPropagation()">
        </mat-row>

        <mat-row *matRowDef="let row; columns: ['expandedDetail']" class="detail-row"></mat-row>



    </mat-table>
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <mat-form-field>
            <input (keyup)="applyFilter($event)" matInput placeholder="Search term">
        </mat-form-field>
        <!-- Paginator -->
        <mat-paginator [length]="resultsLength" [pageSizeOptions]="[25, 50, 100]" [pageSize]="25" showFirstLastButtons
            aria-label="Select page of results">
        </mat-paginator>
    </div>

</div>

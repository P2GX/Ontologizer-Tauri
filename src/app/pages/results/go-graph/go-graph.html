<div class="go-graph-container">
    <div class="control-panel">
        <app-dropdown-menu [label]="'Aspect'" [options]="subgraphs" [selected]="'Molecular Function'"
            (selectedChange)="selectChart($event)"></app-dropdown-menu>
        <app-dropdown-menu [label]="'Show'" [options]="topNOptions" [selected]="selectedTopN"
            (selectedChange)="selectTopN($event)"></app-dropdown-menu>
        <app-legend [maxValue]="legendMaxValue" [isBayesian]="isBayesian"></app-legend>
        <div class="help-icon" (mouseover)="showTooltip = true" (mouseout)="showTooltip = false">?</div>
    </div>

    <div #MFgraphvizContainer class="graphviz-container" [hidden]="selectedChart !== 'MF'"></div>
    <div class="hover-node-tooltip" id="MFTooltip"></div>
    <div #BPgraphvizContainer class="graphviz-container" [hidden]="selectedChart !== 'BP'"></div>
    <div class="hover-node-tooltip" id="BPTooltip"></div>
    <div #CCgraphvizContainer class="graphviz-container" [hidden]="selectedChart !== 'CC'"></div>
    <div class="hover-node-tooltip" id="CCTooltip"></div>

    @if (showTooltip) {
        <app-tooltip type="goGraphInfo"></app-tooltip>
    }
</div>

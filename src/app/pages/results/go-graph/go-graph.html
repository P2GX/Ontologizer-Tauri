<div class="go-graph-container">
    <div class="control-panel">
        <app-dropdown-menu [label]="'Aspect'" [options]="subgraphs" [selected]="'Molecular Function'"
            (selectedChange)="selectChart($event)"></app-dropdown-menu>
        <app-dropdown-menu [label]="'Show'" [options]="topNOptions" [selected]="selectedTopN"
            (selectedChange)="selectTopN($event)"></app-dropdown-menu>
        <button class="expand-graph" (click)="toggleExpanded()">
            <span class="material-symbols-outlined icon">open_in_full</span>
        </button>
        <app-legend [maxValue]="legendMaxValue" [isBayesian]="isBayesian"></app-legend>
        <div class="help-icon" (mouseover)="showTooltip = true" (mouseout)="showTooltip = false">?</div>
    </div>

    <div #MFgraphvizContainer class="graphviz-container" [hidden]="(selectedChart !== 'MF') || showNonSignificant"></div>
    <div class="hover-node-tooltip" id="MFTooltip"></div>
    <div #BPgraphvizContainer class="graphviz-container" [hidden]="(selectedChart !== 'BP') || showNonSignificant"></div>
    <div class="hover-node-tooltip" id="BPTooltip"></div>
    <div #CCgraphvizContainer class="graphviz-container" [hidden]="(selectedChart !== 'CC') || showNonSignificant"></div>
    <div class="hover-node-tooltip" id="CCTooltip"></div>

    <div #MFgraphvizContainerFull class="graphviz-container" [hidden]="(selectedChart !== 'MF') || !showNonSignificant"></div>
    <div class="hover-node-tooltip" id="MFTooltipFull"></div>
    <div #BPgraphvizContainerFull class="graphviz-container" [hidden]="(selectedChart !== 'BP') || !showNonSignificant"></div>
    <div class="hover-node-tooltip" id="BPTooltipFull"></div>
    <div #CCgraphvizContainerFull class="graphviz-container" [hidden]="(selectedChart !== 'CC') || !showNonSignificant"></div>
    <div class="hover-node-tooltip" id="CCTooltipFull"></div>

    @if (showTooltip) {
        <app-tooltip type="goGraphInfo"></app-tooltip>
    }
</div>

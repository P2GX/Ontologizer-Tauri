<div class="page-header">
    <h1 class="page-title">Settings</h1>
    <div style="margin-left:2rem; display:flex; gap:2em;">
        <h2 class="sub-title">Adjust settings or use default settings.</h2>
    </div>
</div>
<div class="settings-content">
    <div class="analysis-settings">
        <div class="settings" id="analysisMethod">
            <app-dropdown-menu [label]="'Analysis Method'" [options]="analysisMethods" [selected]="'TermForTerm'"
                (selectedChange)="SelectSetting($event, 'analysisMethod')"></app-dropdown-menu>
        </div>
        <mat-divider class="horizontal"></mat-divider>
        <div class="settings" id="mtcMethod">
            <app-dropdown-menu [label]="'Multiple Testing Correction Method'" [options]="mtcMethod"
                [selected]="'Bonferroni'" (selectedChange)="SelectSetting($event, 'mtcMethod')"></app-dropdown-menu>
        </div>
         <mat-divider class="horizontal"></mat-divider>
    </div>
</div>

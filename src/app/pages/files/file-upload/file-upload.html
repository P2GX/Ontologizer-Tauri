<div class="file-upload-card">
    <div class="wrapper">
        <div class="step">
            <div class="step-header">
                <div class="step-title">{{stepTitle}}</div>
                <div class="tooltip-trigger">
                    <div class="help-icon">?</div>
                    <app-tooltip [type]="processFileType" />
                </div>
            </div>
        </div>
        <mat-divider class="horizontal" />

        <div class="upload-form" (click)="openFileDialog()" [class.disabled]="!dependenciesLoaded">
            <span class="material-symbols-outlined upload-icon">cloud_upload</span>
            <p>{{label}}</p>
        </div>
        <p class="subtitle">{{ subtitle }}</p>

        @if (fileLoading) {
            <div class="progress">
                <span class="loading-text">Loading {{processFileType}} file...</span>
            </div>
        }

        @if (fileLoaded && !fileLoading) {
            <section class="uploaded-area">
                <div class="row">
                    <div class="content">
                        <span class="material-symbols-outlined file-icon">description</span>
                        <div class="details">
                            <span class="name">{{fileName}}</span>
                        </div>
                    </div>
                    <div class="stats-trigger">
                        <div class="help-icon">ℹ</div>
                        <div class="stats-panel">
                            <dl class="stats-list">
                                @for (stat of fileStats; track stat.key) {
                                    <div class="stats-row">
                                        <dt>{{ stat.key }}</dt>
                                        <dd>{{ stat.value }}</dd>
                                    </div>
                                }
                            </dl>
                        </div>
                    </div>
                    <span class="material-symbols-outlined check-icon"></span>
                </div>
            </section>
        }
    </div>
</div>

<div class="dropdown-container">
    <h4>{{ label }}</h4>
    <ul class="settings-menu">
        <li (click)="toggleMenu()" class="settings-menu-header">
            <p>{{ selected }}</p>
            <img src="assets/icons/arrow-down.svg" alt="Arrow Icon" [class.down]="menuOpen" />

        </li>
        <ul class="settings-submenu" [class.open]="menuOpen">
            <li *ngFor="let opt of options" (click)="selectOption(opt)">{{ opt }}</li>
        </ul>

    </ul>
</div>
